<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>POS Interface</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --pink: #ff7abf;
    --light: #f6f6f6;
    --border: #e5e5e5;
    --dark: #333;
}

* {
    box-sizing: border-box;
    font-family: system-ui, sans-serif;
}

body {
    margin: 0;
    background: #fafafa;
}

/* Layout */
.pos {
    display: grid;
    grid-template-columns: 360px 1fr;
    height: 100vh;
}

/* Cart */
.cart {
    background: #fff;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
}

.cart-header {
    padding: 15px;
    font-weight: bold;
    border-bottom: 1px solid var(--border);
}

.cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.cart-item small {
    color: #888;
}

.cart-summary {
    padding: 15px;
    border-top: 1px solid var(--border);
}

.cart-summary div {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
}

.total {
    font-weight: bold;
    font-size: 18px;
}

.cart-actions {
    padding: 15px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

button {
    padding: 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.send {
    background: #7a4a5c;
    color: #fff;
}

.pay {
    background: #ddd;
}

/* Products */
.products {
    padding: 20px;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.search {
    padding: 10px;
    width: 260px;
    border-radius: 6px;
    border: 1px solid var(--border);
}

.categories {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.category {
    padding: 10px 20px;
    border-radius: 8px;
    background: #fff;
    border: 1px solid var(--border);
    cursor: pointer;
}

.category.active {
    background: var(--pink);
    color: #fff;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
}

.product {
    background: #fff;
    border-radius: 10px;
    padding: 15px;
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
}

.product::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: var(--pink);
    border-radius: 0 0 10px 10px;
}

.badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: #000;
    color: #fff;
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 4px;
}
</style>
</head>
<body>

<div class="pos">
    <!-- CART -->
    <div class="cart">
        <div class="cart-header">Commande</div>

        <div class="cart-items" id="cartItems"></div>

        <div class="cart-summary">
            <div><span>Taxes</span><span id="tax">0.00 KSh</span></div>
            <div class="total"><span>Total</span><span id="total">0.00 KSh</span></div>
        </div>

        <div class="cart-actions">
            <button class="send">Envoyer</button>
            <button class="pay">Paiement</button>
        </div>
    </div>

    <!-- PRODUCTS -->
    <div class="products">
        <div class="top-bar">
            <div class="categories">
                <div class="category active">Food</div>
                <div class="category">Drinks</div>
            </div>

            <input class="search" placeholder="Rechercher des produits...">
        </div>

        <div class="grid" id="productGrid"></div>
    </div>
</div>

<script>
const products = [
    { id: 1, name: "Bacon Burger", price: 17.98 },
    { id: 2, name: "Pasta Bolognese", price: 5.22 },
    { id: 3, name: "Chicken Curry Sandwich", price: 3.48 },
    { id: 4, name: "Spicy Tuna Sandwich", price: 3.48 },
    { id: 5, name: "Mozzarella Sandwich", price: 4.52 },
];

const cart = {};

const grid = document.getElementById("productGrid");
const cartItems = document.getElementById("cartItems");
const taxEl = document.getElementById("tax");
const totalEl = document.getElementById("total");

function renderProducts() {
    grid.innerHTML = "";
    products.forEach(p => {
        const div = document.createElement("div");
        div.className = "product";
        div.innerHTML = `
            ${cart[p.id] ? `<div class="badge">${cart[p.id]}</div>` : ""}
            ${p.name}
        `;
        div.onclick = () => addToCart(p);
        grid.appendChild(div);
    });
}

function addToCart(product) {
    cart[product.id] = (cart[product.id] || 0) + 1;
    renderCart();
    renderProducts();
}

function renderCart() {
    cartItems.innerHTML = "";
    let subtotal = 0;

    Object.keys(cart).forEach(id => {
        const p = products.find(x => x.id == id);
        const qty = cart[id];
        const line = p.price * qty;
        subtotal += line;

        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
            <div>${qty} ${p.name}</div>
            <div>${line.toFixed(2)} KSh</div>
        `;
        cartItems.appendChild(div);
    });

    const tax = subtotal * 0.14;
    const total = subtotal + tax;

    taxEl.textContent = tax.toFixed(2) + " KSh";
    totalEl.textContent = total.toFixed(2) + " KSh";
}

renderProducts();
</script>

</body>
</html>
